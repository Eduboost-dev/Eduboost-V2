events { worker_connections 1024; }
http {
  # Rate-limit zone for auth endpoints — targets active v2 auth routes (7.5).
  # Previously targeted /api/v1/auth/ which no longer exists.
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

  upstream api { server api:8000; }
  upstream frontend { server frontend:3050; }

  server {
    listen 80;
    listen 443 ssl;
    server_name _;
    # Placeholder cert paths for production runtime checks (uses LetsEncrypt default path)
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;

    location /health { return 200 'ok'; add_header Content-Type text/plain; }

    # Auth rate limiting — v2 routes (7.5)
    location /api/v2/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
