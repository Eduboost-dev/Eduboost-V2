name: jwt-secret-rotation-evidence

on:
  workflow_dispatch:
    inputs:
      evidence_environment:
        description: "Environment being evidenced"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

permissions:
  contents: read
  actions: read

jobs:
  jwt-secret-rotation-evidence:
    name: JWT secret rotation evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .
      JWT_EVIDENCE_ENV: ${{ github.event.inputs.evidence_environment }}
      JWT_ACCESS_SECRET_CURRENT: ${{ secrets.JWT_ACCESS_SECRET_CURRENT }}
      JWT_REFRESH_SECRET_CURRENT: ${{ secrets.JWT_REFRESH_SECRET_CURRENT }}
      JWT_ACCESS_SECRET_PREVIOUS: ${{ secrets.JWT_ACCESS_SECRET_PREVIOUS }}
      JWT_REFRESH_SECRET_PREVIOUS: ${{ secrets.JWT_REFRESH_SECRET_PREVIOUS }}
      JWT_ACCESS_SECRET_PREVIOUS_FINGERPRINT: ${{ secrets.JWT_ACCESS_SECRET_PREVIOUS_FINGERPRINT }}
      JWT_REFRESH_SECRET_PREVIOUS_FINGERPRINT: ${{ secrets.JWT_REFRESH_SECRET_PREVIOUS_FINGERPRINT }}
      JWT_SECRET_STORE: ${{ secrets.JWT_SECRET_STORE }}
      JWT_ROTATION_REFERENCE: ${{ secrets.JWT_ROTATION_REFERENCE }}
      JWT_ROTATION_DATE: ${{ secrets.JWT_ROTATION_DATE }}
      JWT_ROTATION_RESULT: ${{ secrets.JWT_ROTATION_RESULT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.3"
      - name: Verify required secret metadata
        run: |
          test -n "$JWT_ACCESS_SECRET_CURRENT"
          test -n "$JWT_REFRESH_SECRET_CURRENT"
          test -n "$JWT_SECRET_STORE"
          test -n "$JWT_ROTATION_REFERENCE"
          test -n "$JWT_ROTATION_DATE"
          test -n "$JWT_ROTATION_RESULT"
          if [ -z "$JWT_ACCESS_SECRET_PREVIOUS" ] && [ -z "$JWT_ACCESS_SECRET_PREVIOUS_FINGERPRINT" ]; then exit 1; fi
          if [ -z "$JWT_REFRESH_SECRET_PREVIOUS" ] && [ -z "$JWT_REFRESH_SECRET_PREVIOUS_FINGERPRINT" ]; then exit 1; fi
      - name: Run JWT secret rotation evidence
        run: python scripts/jwt_secret_rotation_evidence.py
      - name: Upload JWT evidence status only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jwt-secret-rotation-evidence-status
          path: |
            docs/release/jwt_secret_rotation_evidence_status.json
            docs/release/jwt_secret_rotation_evidence_status.md
          if-no-files-found: warn
