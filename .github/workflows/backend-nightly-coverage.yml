name: Backend Nightly Coverage

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

jobs:
  nightly-backend-coverage:
    name: Nightly Backend Coverage and Governance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eduboost
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: eduboost_test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      ENVIRONMENT: test
      APP_ENV: test
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://test
      JWT_SECRET: test-jwt-secret-32-chars-minimum-value
      JWT_SECRET_KEY: test-jwt-secret-32-chars-minimum-value
      ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      ENCRYPTION_SALT: test-encryption-salt
      AUDIT_DATABASE_URL: postgresql+asyncpg://eduboost:testpassword@localhost:5432/eduboost_test
      REDIS_URL: redis://localhost:6379/0
      JUDICIARY_API_KEY: test-judiciary-key
      JUDICIARY_SERVICE_URL: http://localhost:8001

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements/dev.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
      - name: Run full backend coverage sweep
        continue-on-error: true
        run: make test-coverage-full
      - name: Run governance suite
        continue-on-error: true
        run: make test-governance
      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-backend-coverage-xml
          path: coverage.xml
      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-backend-coverage-html
          path: coverage_html/
