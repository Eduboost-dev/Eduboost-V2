name: db-backup-restore-rollback-evidence

on:
  workflow_dispatch:
    inputs:
      run_drill:
        description: "Run pg_dump plus pg_restore into disposable restore DB"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  actions: read

jobs:
  db-backup-restore-rollback-evidence:
    name: DB backup restore rollback evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      restore_db:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: RestorePass123
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: .
      DB_ROLLBACK_SOURCE_DATABASE_URL: ${{ secrets.DB_ROLLBACK_SOURCE_DATABASE_URL }}
      DB_ROLLBACK_RESTORE_DATABASE_URL: "postgresql://postgres:RestorePass123@localhost:5433/postgres"
      DB_ROLLBACK_PG_RESTORE_ARGS: "--schema=public"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client from official apt repository
        run: |
          # Add official PostgreSQL repository for version 17
          sudo apt-get update -qq
          sudo apt-get install -y ca-certificates gnupg lsb-release curl
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          
          # Remove OLD pg_dump 16 first - explicitly remove the Ubuntu version
          sudo apt-get remove -y postgresql-client-16 2>/dev/null || true
          
          # Update apt sources and install PostgreSQL 17
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          
          # Verify installation - show version
          echo "=== pg_dump version check ==="
          pg_dump --version
          echo "=== pg_restore version check ==="
          pg_restore --version
          
          # Verify PATH and symlinks
          echo "=== Verifying pg_dump location ==="
          ls -la /usr/bin/pg_dump
          echo "=== pg_dump help output ==="
          pg_dump --help | head -5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install psycopg2-binary

      - name: Verify required secrets
        run: |
          test -n "${DB_ROLLBACK_SOURCE_DATABASE_URL}" || exit 1
          test -n "${DB_ROLLBACK_RESTORE_DATABASE_URL}" || exit 1
          test "${DB_ROLLBACK_SOURCE_DATABASE_URL}" != "${DB_ROLLBACK_RESTORE_DATABASE_URL}" || exit 1
          
          case "${DB_ROLLBACK_SOURCE_DATABASE_URL}" in
            *"<"*|*">"*|*"example.com"*|*"localhost"*|*"127.0.0.1"*)
              echo "Source URL contains placeholder or localhost"
              exit 1
              ;;
          esac

      - name: Run DB backup restore rollback evidence
        run: |
          if [ "${{ github.event.inputs.run_drill }}" = "true" ]; then
            python scripts/db_backup_restore_rollback_evidence.py --run-drill
          else
            python scripts/db_backup_restore_rollback_evidence.py
          fi

      - name: Show evidence status
        if: always()
        run: |
          cat docs/release/db_backup_restore_rollback_evidence_status.json || true

      - name: Upload DB rollback status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-backup-restore-rollback-evidence-status
          path: |
            docs/release/db_backup_restore_rollback_evidence_status.json
            docs/release/db_backup_restore_rollback_evidence_status.md
          if-no-files-found: warn
