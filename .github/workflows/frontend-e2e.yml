name: Frontend E2E Opt-In

on:
  workflow_dispatch:
    inputs:
      frontend_base_url:
        description: "Frontend base URL"
        required: true
        default: "http://127.0.0.1:5173"
      learner_path:
        description: "Learner journey path"
        required: false
        default: "/"
      parent_path:
        description: "Parent journey path"
        required: false
        default: "/"
      web_server_command:
        description: "Optional command to start frontend server"
        required: false
        default: ""

jobs:
  frontend-e2e-opt-in:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    env:
      FRONTEND_BASE_URL: ${{ inputs.frontend_base_url }}
      LEARNER_JOURNEY_PATH: ${{ inputs.learner_path }}
      PARENT_JOURNEY_PATH: ${{ inputs.parent_path }}
      PLAYWRIGHT_WEB_SERVER_COMMAND: ${{ inputs.web_server_command }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/frontend/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: ${{ github.workspace }}
        run: app/frontend/node_modules/.bin/playwright install --with-deps chromium
      - name: Run mocked frontend E2E
        working-directory: ${{ github.workspace }}
        run: PLAYWRIGHT_MOCK_API=1 app/frontend/node_modules/.bin/playwright test tests/e2e/learner-mocked-api-journey.spec.ts tests/e2e/parent-mocked-api-journey.spec.ts
      - name: Run smoke frontend E2E
        working-directory: ${{ github.workspace }}
        run: app/frontend/node_modules/.bin/playwright test tests/e2e/learner-vertical-journey.spec.ts tests/e2e/parent-vertical-journey.spec.ts
