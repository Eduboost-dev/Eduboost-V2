# Secrets Scanning Workflow

name: Secrets Scan

on:
  push:
    branches: [master, main, 'phase-*/**']
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

permissions:
  contents: read

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline . > /tmp/scan_results.json
          
          # Count findings
          FINDINGS=$(python3 -c "import json; d=json.load(open('/tmp/scan_results.json')); print(len(d.get('results', {})))")
          echo "Secret findings: $FINDINGS"
          
          # Check if new secrets found
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::Detected $FINDINGS potential secrets. Review and allowlist if false positives."
            detect-secrets scan --baseline .secrets.baseline . | jq .
            exit 1
          fi

      - name: Update baseline if needed
        if: github.event_name == 'schedule'
        run: |
          detect-secrets scan . > .secrets.baseline
          git config --local user.email "ci@eduboost.co.za"
          git config --local user.name "CI Bot"
          git add .secrets.baseline
          git commit -m "chore: update secrets baseline" || echo "No changes to baseline"

      - name: Audit allowlist
        run: |
          # Check for allowlisted secrets
          ALLOWLISTED=$(detect-secrets scan --baseline .secrets.baseline --only-allowlisted . | jq 'length')
          echo "Allowlisted secrets: $ALLOWLISTED"