# EduBoost E2E Test Suite

name: E2E Tests

on:
  push:
    branches: [master, main, 'phase-*/**']
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/frontend/pnpm-lock.yaml

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install root dependencies (Playwright, Supabase)
        run: pnpm install

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker Compose stack
        run: |
          docker-compose up -d
          sleep 15

      - name: Wait for services
        run: |
          # Check backend health
          for i in {1..30}; do
            curl -s http://localhost:8000/health && break
            sleep 2
          done
          curl -s http://localhost:8000/health

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3050
          CI: true
        run: |
          source .venv/bin/activate
          # Run from project root where playwright.config.ts lives
          npx playwright test --reporter=list --project=chromium

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: docker-compose down --volumes
