services:
  content_factory_test_db:
    image: postgres:16
    environment:
      POSTGRES_USER: eduboost
      POSTGRES_PASSWORD: eduboost
      POSTGRES_DB: eduboost_content_factory_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduboost -d eduboost_content_factory_test"]
      interval: 5s
      timeout: 5s
      retries: 5
