# ─────────────────────────────────────────────────────────────────────────────
# pytest.ini — default fast profile (no coverage instrumentation).
#
# Coverage runs: `make test-coverage` or `pytest -c pytest-coverage.ini …`
# PR/local fast gate: `make test-fast` (parallel, excludes governance/slow/llm/e2e)
# ─────────────────────────────────────────────────────────────────────────────

[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs = .* build dist CVS _darcs {arch} *.egg .venv venv node_modules .hypothesis .pytest_cache tests/legacy
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --strict-markers
    --tb=short
    --import-mode=importlib
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

markers =
    unit: fast, isolated unit tests (no I/O)
    integration: tests that require a live DB or Redis
    e2e: end-to-end tests via Playwright (require running stack)
    slow: tests that take >5 seconds
    llm: tests that make real LLM API calls (skipped in CI unless ALLOW_LLM_TESTS=1)
    performance: performance/SLO checks that may require a seeded database or running stack
    smoke: staging smoke tests against a deployed environment
    smoke: smoke / critical-path tests
    governance: release/evidence/doc-contract meta-tests (excluded from PR fast gate)

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Marker examples:
#   make test-fast
#   pytest -m governance
#   pytest -m "not llm and not e2e"
